<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Circle background -->
  <circle cx="100" cy="100" r="90" stroke="#333" stroke-width="4" fill="none"></circle>

  <!-- Graduation cap -->
  <polygon points="60,80 100,60 140,80 100,100" fill="#333"></polygon>
  <rect x="85" y="80" width="30" height="8" fill="#333"></rect>

  <!-- Tassel -->
  <line x1="120" y1="82" x2="120" y2="105" stroke="#333" stroke-width="3"></line>
  <circle cx="120" cy="108" r="3" fill="#333"></circle>

  <!-- Code brackets -->
  <text x="65" y="150" font-family="monospace" font-size="36" fill="#333">&lt;/&gt;</text>

</svg>